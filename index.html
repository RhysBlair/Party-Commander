<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Commander</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- 상단 HUD -->
    <div id="hud">
      <span id="hud-gold">골드: 0</span>
      <span id="hud-gems">젬: 0</span>
      <span id="hud-stage">스테이지: 1</span>
      <span id="hud-progress">진행: 0 / 20</span>
    </div>

    <div id="main-area">
      <!-- 좌측: 전투 필드 Canvas + 캐릭터 리스트 패널 -->
      <div id="canvas-wrap">
        <canvas id="field-canvas" width="640" height="480"></canvas>
        <div id="char-list-panel"></div>
      </div>

      <!-- 우측: UI 패널 -->
      <div id="ui-panel">
        <div id="tab-bar">
          <button class="tab-btn active" data-tab="characters">캐릭터</button>
          <button class="tab-btn" data-tab="stats">스탯</button>
          <button class="tab-btn" data-tab="equipment">장비</button>
          <button class="tab-btn" data-tab="shop">상점</button>
          <button class="tab-btn" data-tab="skills">스킬</button>
          <button class="tab-btn" data-tab="pets">펫</button>
          <button class="tab-btn" data-tab="stage">스테이지</button>
          <button class="tab-btn" data-tab="upgrades">업그레이드</button>
          <button class="tab-btn" data-tab="raid">레이드</button>
        </div>
        <div id="tab-content">
          <div id="tab-characters" class="tab-pane active">
            <p id="no-char-msg">캐릭터가 없습니다.</p>
          </div>
          <div id="tab-stats" class="tab-pane"></div>
          <div id="tab-equipment" class="tab-pane"></div>
          <div id="tab-shop" class="tab-pane"></div>
          <div id="tab-skills" class="tab-pane"></div>
          <div id="tab-pets" class="tab-pane"></div>
          <div id="tab-stage" class="tab-pane"></div>
          <div id="tab-upgrades" class="tab-pane"></div>
          <div id="tab-raid" class="tab-pane"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 캐릭터 상세 모달 -->
  <div id="char-modal-overlay" onclick="closeCharModal()">
    <div id="char-modal" onclick="event.stopPropagation()">
      <div id="char-modal-header">
        <div id="char-modal-title"></div>
        <button id="char-modal-close" onclick="closeCharModal()">✕</button>
      </div>
      <div id="char-modal-tabs">
        <button class="modal-tab-btn active" data-section="stats" onclick="switchCharModalSection('stats')">능력치</button>
        <button class="modal-tab-btn" data-section="equipment" onclick="switchCharModalSection('equipment')">장비</button>
        <button class="modal-tab-btn" data-section="skills" onclick="switchCharModalSection('skills')">스킬</button>
      </div>
      <div id="char-modal-body"></div>
    </div>
  </div>

  <!-- 레이드 결과 모달 -->
  <div id="raid-result-overlay">
    <div id="raid-result-box">
      <div id="raid-result-title">⚔ 자쿰 격파!</div>
      <div class="raid-result-section">
        <div class="raid-result-label">클리어 시간</div>
        <div id="raid-result-time"></div>
      </div>
      <div class="raid-result-section">
        <div class="raid-result-label">딜 순위 (TOP 3)</div>
        <div id="raid-result-dmg"></div>
      </div>
      <div class="raid-result-section">
        <div class="raid-result-label">회복량</div>
        <div id="raid-result-heal"></div>
      </div>
      <button id="raid-result-confirm" onclick="closeRaidResult()">확인</button>
    </div>
  </div>

  <!-- 오프라인 보상 모달 -->
  <div id="offline-modal">
    <div id="offline-modal-box">
      <div id="offline-modal-title">⏰ 오프라인 보상</div>
      <div id="offline-modal-body">
        <div class="offline-row">
          <span class="offline-label">오프라인 시간</span>
          <span id="offline-time"></span>
        </div>
        <div class="offline-row">
          <span class="offline-label">획득 골드</span>
          <span id="offline-gold" style="color:#e2b96f"></span>
        </div>
        <div class="offline-label" style="margin-top:10px;margin-bottom:4px">경험치 획득</div>
        <div id="offline-exp-list"></div>
      </div>
      <button id="offline-confirm" onclick="closeOfflineModal();">확인</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/state.js"></script>
  <script src="js/loot.js"></script>
  <script src="js/upgrade.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/raid.js"></script>
  <script src="js/render.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
